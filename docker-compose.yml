version: "3.9"

services:

  backend:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-https://n8n.agentsmithery.de/webhook/dokument-eingang}

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend
