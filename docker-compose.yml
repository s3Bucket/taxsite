version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: portal
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portalpass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://portal:portalpass@postgres:5432/portal
      SECRET_KEY: bitte-ein-lang-zufaelliges-secret-setzen

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend

volumes:
  postgres_data: