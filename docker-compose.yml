version: "3.9"

services:

  backend:
    build: ./backend
    restart: always
    environment:
      SUPABASE_URL: http://frontend
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      JWT_SECRET: ${JWT_SECRET}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-https://n8n.agentsmithery.de/webhook/dokument-eingang}

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend
