server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Öffentliche Seiten
    location = /login.html {
        try_files $uri =404;
    }

    location = /register.html {
        try_files $uri =404;
    }

    # Öffentliche statische Assets, falls du welche hast
    location /assets/ {
        try_files $uri =404;
    }

    # Login/Register Requests an Backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # interner Auth-Check für nginx
    location = /_auth_check {
        internal;
        proxy_pass http://backend:8000/api/auth/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Host $host;
    }

    # Alles andere nur nach erfolgreichem Backend-Login
    location / {
        auth_request /_auth_check;
        error_page 401 = /login.html;
        try_files $uri $uri/ /index.html;
    }
}