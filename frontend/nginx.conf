server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Öffentliche Seiten
    location = /index.html {
        try_files $uri =404;
    }

    location = /register.html {
        try_files $uri =404;
    }

    # Öffentliche statische Assets
    location /assets/ {
        try_files $uri =404;
    }

    # API an Backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # Interner Auth-Check
    location = /_auth_check {
        internal;
        proxy_pass http://backend:8000/api/auth/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Host $host;
    }

    # Geschützte Formularseiten
    location ~ ^/(eu|gbr|gmbh|kg-ohg|eg|stiftung|naturliche-person)\.html$ {
        auth_request /_auth_check;
        error_page 401 =302 /index.html;
        try_files $uri =404;
    }

    # Root zeigt auf Login
    location = / {
        try_files /index.html =404;
    }

    # Alles andere nur ausliefern, wenn Datei existiert
    location / {
        try_files $uri $uri/ =404;
    }
}