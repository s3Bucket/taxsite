server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Supabase Auth (GoTrue) ──────────────────────────────────────────────
    # supabase-js ruft /auth/v1/... auf
    location /auth/v1/ {
        proxy_pass http://auth:9999/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── PostgREST ───────────────────────────────────────────────────────────
    # supabase-js ruft /rest/v1/... auf; auch von n8n nutzbar
    location /rest/v1/ {
        proxy_pass http://rest:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header apikey $http_apikey;
    }

    # ── Backend API ─────────────────────────────────────────────────────────
    location /api/ {
        client_max_body_size 10m;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
    }

    # ── Interner Auth-Check für nginx auth_request ──────────────────────────
    location = /_auth_check {
        internal;
        proxy_pass http://backend:8000/api/auth/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Host $host;
    }

    # ── Öffentliche Seiten ──────────────────────────────────────────────────
    location = / {
        try_files /index.html =404;
    }

    location = /index.html {
        try_files $uri =404;
    }

    location = /register.html {
        try_files $uri =404;
    }

    # ── Statische Assets ────────────────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp)$ {
        try_files $uri =404;
    }

    # ── Geschützte HTML-Seiten (auth_request) ───────────────────────────────
    location ~* \.html$ {
        auth_request /_auth_check;
        error_page 401 403 =302 /index.html;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
