<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stammdaten Portal</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js"></script>
</head>
<body>
<div class="header">
    <img src="/static/Logo.jpg" alt="BK Steuerberatung Logo" class="logo">
</div>
<div class="container">
    <div class="panel">
        <div class="topbar">
            <div>
                <h1>Stammdaten Portal</h1>
                <p id="userInfo">Willkommen im Portal.</p>
            </div>
            <div class="actions">
                <button onclick="logout()">Logout</button>
            </div>
        </div>

        <h2>Rechtsformen</h2>
        <p>Wähle die passende Rechtsform aus.</p>

        <div class="navlinks">
            <a href="/eu.html"><strong>Einzelunternehmen / Freier Beruf</strong></a>
            <a href="/gbr.html"><strong>GbR</strong></a>
            <a href="/gmbh.html"><strong>GmbH</strong></a>
            <a href="/kg-ohg.html"><strong>KG / OHG</strong></a>
            <a href="/eg.html"><strong>eG</strong></a>
            <a href="/stiftung.html"><strong>Stiftung</strong></a>
            <a href="/naturliche-person.html"><strong>Natürliche Person</strong></a>
        </div>
    </div>
</div>

<script>
    async function initPortal() {
        const auth = await requireAuth();
        if (auth && auth.user) {
            document.getElementById("userInfo").innerText = "Eingeloggt als: " + auth.user;
        }
    }
    initPortal();
</script>
</body>
</html>
