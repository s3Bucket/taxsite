<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stammdaten Portal</title>

    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js"></script>

    <style>
        .portal-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 24px;
            align-items: start;
        }

        .side-nav {
            background: #fff;
            border: 1px solid #dbe3ef;
            border-radius: 16px;
            padding: 18px;
            position: sticky;
            top: 20px;
        }

        .side-nav h3 {
            margin-top: 0;
            margin-bottom: 14px;
        }

        .side-nav a {
            display: block;
            padding: 12px 14px;
            margin-bottom: 10px;
            text-decoration: none;
            color: #0f172a;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            transition: 0.2s ease;
            cursor: pointer;
        }

        .side-nav a:hover,
        .side-nav a.active {
            background: #e8f0fe;
            border-color: #93c5fd;
        }

        .portal-content {
            background: #fff;
            border: 1px solid #dbe3ef;
            border-radius: 16px;
            padding: 20px;
            min-height: 80vh;
        }

        @media (max-width: 960px) {
            .portal-layout {
                grid-template-columns: 1fr;
            }

            .side-nav {
                position: static;
            }
        }
    </style>
</head>

<body>

<div class="header">
    <img src="/static/Logo.png" alt="Logo" class="logo">
</div>

<div class="container">
    <div class="panel">

        <div class="topbar">
            <div>
                <h1>Stammdaten Portal</h1>
                <p id="userInfo">Willkommen im Portal.</p>
            </div>
            <div class="actions">
                <button onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="portal-layout">

            <!-- LEFT NAV -->
            <aside class="side-nav">
                <h3>Rechtsformen</h3>

                <a data-page="/eu.html">Einzelunternehmen / Freier Beruf</a>
                <a data-page="/gbr.html">GbR</a>
                <a data-page="/gmbh.html">GmbH</a>
                <a data-page="/kg-ohg.html">KG / OHG</a>
                <a data-page="/eg.html">eG</a>
                <a data-page="/stiftung.html">Stiftung</a>
                <a data-page="/naturliche-person.html">Natürliche Person</a>
            </aside>

            <!-- RIGHT CONTENT -->
            <main id="portalContent" class="portal-content">
                <p>Bitte links eine Rechtsform auswählen.</p>
            </main>

        </div>

    </div>
</div>

<script>
    async function initPortal() {
        const auth = await requireAuth();
        if (auth && auth.user) {
            document.getElementById("userInfo").innerText = "Eingeloggt als: " + auth.user;
        }

        bindNav();

        const params = new URLSearchParams(window.location.search);
        const startPage = params.get("page") || "/eu.html";

        await loadPage(startPage);
    }

    function bindNav() {
        document.querySelectorAll("[data-page]").forEach(link => {
            link.addEventListener("click", async (e) => {
                e.preventDefault();

                const page = link.dataset.page;

                history.replaceState(null, "", "/portal.html?page=" + encodeURIComponent(page));

                await loadPage(page);
                setActive(page);
            });
        });
    }

    function setActive(page) {
        document.querySelectorAll("[data-page]").forEach(link => {
            link.classList.toggle("active", link.dataset.page === page);
        });
    }

    async function loadPage(page) {
        const target = document.getElementById("portalContent");

        target.innerHTML = "<p>Lade...</p>";

        try {
            const res = await fetch(page, {
                method: "GET",
                credentials: "include"
            });

            if (!res.ok) {
                target.innerHTML = "<p>Seite konnte nicht geladen werden.</p>";
                return;
            }

            const html = await res.text();
            const doc = new DOMParser().parseFromString(html, "text/html");

            const panel = doc.querySelector(".panel");

            if (!panel) {
                target.innerHTML = "<p>Ungültige Seite.</p>";
                return;
            }

            // Topbar entfernen (wichtig!)
            const topbar = panel.querySelector(".topbar");
            if (topbar) topbar.remove();

            target.innerHTML = panel.innerHTML;

            // 🔥 HIER passiert die Magie
            if (window.portalPageInits && typeof window.portalPageInits[page] === "function") {
                await window.portalPageInits[page]();
            }

            setActive(page);

        } catch (err) {
            console.error(err);
            target.innerHTML = "<p>Fehler beim Laden.</p>";
        }
    }

    initPortal();
</script>

</body>
</html>
