<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stammdaten Portal</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js"></script>

    <style>
        .portal-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 24px;
            align-items: start;
        }

        .side-nav {
            background: #fff;
            border: 1px solid #dbe3ef;
            border-radius: 16px;
            padding: 18px;
            position: sticky;
            top: 20px;
        }

        .side-nav h3 {
            margin-top: 0;
            margin-bottom: 14px;
        }

        .side-nav a {
            display: block;
            padding: 12px 14px;
            margin-bottom: 10px;
            text-decoration: none;
            color: #0f172a;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            transition: 0.2s ease;
            cursor: pointer;
        }

        .side-nav a:hover,
        .side-nav a.active {
            background: #e8f0fe;
            border-color: #93c5fd;
        }

        .portal-content {
            background: #fff;
            border: 1px solid #dbe3ef;
            border-radius: 16px;
            padding: 20px;
            min-height: 80vh;
        }

        .portal-loading,
        .portal-error {
            padding: 20px;
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }

        @media (max-width: 960px) {
            .portal-layout {
                grid-template-columns: 1fr;
            }

            .side-nav {
                position: static;
            }
        }
    </style>
</head>
<body>
<div class="header">
    <img src="/static/Logo.png" alt="BK Steuerberatung Logo" class="logo">
</div>

<div class="container">
    <div class="panel">
        <div class="topbar">
            <div>
                <h1>Stammdaten Portal</h1>
                <p id="userInfo">Willkommen im Portal.</p>
            </div>
            <div class="actions">
                <button type="button" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="portal-layout">
            <aside class="side-nav">
                <h3>Rechtsformen</h3>

                <a href="#" data-page="/eu.html">Einzelunternehmen / Freier Beruf</a>
                <a href="#" data-page="/gbr.html">GbR</a>
                <a href="#" data-page="/gmbh.html">GmbH</a>
                <a href="#" data-page="/kg-ohg.html">KG / OHG</a>
                <a href="#" data-page="/eg.html">eG</a>
                <a href="#" data-page="/stiftung.html">Stiftung</a>
                <a href="#" data-page="/naturliche-person.html">Natürliche Person</a>
            </aside>

            <main id="portalContent" class="portal-content">
                <div class="portal-loading">Bitte links eine Rechtsform auswählen.</div>
            </main>
        </div>
    </div>
</div>

<script>
    async function initPortal() {
        const auth = await requireAuth();
        if (auth && auth.user) {
            const userInfo = document.getElementById("userInfo");
            if (userInfo) {
                userInfo.innerText = "Eingeloggt als: " + auth.user;
            }
        }

        bindPortalNav();

        const params = new URLSearchParams(window.location.search);
        const startPage = params.get("page") || "/eu.html";
        await loadPortalPage(startPage);
    }

    function bindPortalNav() {
        document.querySelectorAll("[data-page]").forEach(link => {
            link.addEventListener("click", async (event) => {
                event.preventDefault();
                const page = link.dataset.page;

                history.replaceState(null, "", "/portal.html?page=" + encodeURIComponent(page));
                await loadPortalPage(page);
            });
        });
    }

    function setActiveNav(page) {
        document.querySelectorAll("[data-page]").forEach(link => {
            link.classList.toggle("active", link.dataset.page === page);
        });
    }

    async function loadPortalPage(page) {
        const target = document.getElementById("portalContent");
        target.innerHTML = '<div class="portal-loading">Lade Inhalt ...</div>';

        try {
            const response = await fetch(page, {
                method: "GET",
                credentials: "include"
            });

            if (!response.ok) {
                target.innerHTML = '<div class="portal-error">Seite konnte nicht geladen werden.</div>';
                return;
            }

            const html = await response.text();
            const doc = new DOMParser().parseFromString(html, "text/html");

            const panel = doc.querySelector(".panel");
            if (!panel) {
                target.innerHTML = '<div class="portal-error">Kein gültiger Seiteninhalt gefunden.</div>';
                return;
            }

            const topbar = panel.querySelector(".topbar");
            if (topbar) {
                topbar.remove();
            }

            target.innerHTML = panel.innerHTML;

            if (window.portalPageInits && typeof window.portalPageInits[page] === "function") {
                await window.portalPageInits[page]();
            }

            setActiveNav(page);
        } catch (error) {
            console.error("Fehler beim Laden der Portalseite:", error);
            target.innerHTML = '<div class="portal-error">Fehler beim Laden der Seite.</div>';
        }
    }

    initPortal();
</script>
</body>
</html>
