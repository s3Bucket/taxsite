<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Portal</title>

    <link rel="stylesheet" href="/styles.css">

    <style>
        body{
            font-family:Arial;
            background:#f3f6fb;
            padding:40px;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:10px;
            max-width:600px;
            margin:auto;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        button{
            padding:10px 20px;
            margin-top:20px;
        }
    </style>

</head>

<body>

<div class="card">

    <h1>Stammdaten Portal</h1>

    <p id="user"></p>

    <button onclick="logout()">Logout</button>

    <hr>

    <h2>Formular Test</h2>

    <input id="firma" placeholder="Firma">

    <button onclick="submitForm()">Absenden</button>

    <div id="msg"></div>

</div>

<script>

    async function checkSession(){

        const res = await fetch("/api/auth/check",{
            method:"GET",
            credentials:"include"
        })

        if(!res.ok){

            window.location="/index.html"
            return

        }

        const data = await res.json()

        document.getElementById("user").innerText =
            "Eingeloggt als: "+data.user

    }

    checkSession()

    async function logout(){

        await fetch("/api/logout",{
            method:"POST",
            credentials:"include"
        })

        window.location="/index.html"

    }

    async function submitForm(){

        const firma=document.getElementById("firma").value

        const res = await fetch("/api/forms/submit",{

            method:"POST",

            credentials:"include",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                firma:firma
            })

        })

        if(!res.ok){

            document.getElementById("msg").innerText="Senden fehlgeschlagen"
            return

        }

        document.getElementById("msg").innerText="Gesendet"

    }

</script>

</body>
</html>
