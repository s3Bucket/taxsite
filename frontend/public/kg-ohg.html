<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KG / OHG</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js?v=4"></script>
</head>
<body>
<div class="container">
    <div class="panel">
        <div class="topbar">
            <div>
                <h1>KG / OHG</h1>
                <p id="userInfo">Bitte tragen Sie die Stammdaten ein.</p>
            </div>
            <div class="actions">
                <a class="btn btn-secondary" href="/portal.html">Zurück zum Portal</a>
                <button type="button" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="form-section">
            <h3 class="section-title">Angaben</h3>
            <div class="form-row">
                <div>
                    <label>Anrede</label>
                    <input id="anrede" type="text">
                </div>
                <div>
                    <label>Unternehmensform</label>
                    <input id="unternehmensform" type="text">
                </div>
            </div>
            <label>Unternehmensname</label>
            <input id="unternehmensname" type="text">
            <label>Straße und Hausnummer</label>
            <input id="strasse" type="text">
            <div class="form-row">
                <div>
                    <label>PLZ</label>
                    <input id="plz" type="text">
                </div>
                <div>
                    <label>Ort</label>
                    <input id="ort" type="text">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Telefon</label>
                    <input id="telefon" type="tel">
                </div>
                <div>
                    <label>Mobil</label>
                    <input id="mobil" type="tel">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>E-Mail</label>
                    <input id="email" type="email">
                </div>
                <div>
                    <label>Bankverbindung</label>
                    <input id="bankverbindung" type="text">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Steuernummer</label>
                    <input id="steuernummer" type="text">
                </div>
                <div>
                    <label>USt-IdNr.</label>
                    <input id="ustid" type="text">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Gründungsdatum</label>
                    <input id="gruendungsdatum" type="date">
                </div>
                <div>
                    <label>Bundesland</label>
                    <input id="bundesland" type="text">
                </div>
            </div>
            <label>Unternehmensgegenstand</label>
            <textarea id="gegenstand"></textarea>
        </div>

        <div class="form-section">
            <h3 class="section-title">Komplementär</h3>
            <label>Name</label>
            <input id="komplementaer_name" type="text">
            <label>Personalausweis Komplementär</label>
            <input id="doc_personalausweis_komplementaer" type="file" accept=".pdf,.jpg,.jpeg,.png" multiple>
            <div class="upload-hint">Mehrere Dateien möglich.</div>
        </div>

        <div class="form-section">
            <h3 class="section-title">Kommanditisten</h3>
            <div id="kommanditistenContainer"></div>
            <div class="inline-actions">
                <button type="button" onclick="addKommanditist()">Kommanditist hinzufügen</button>
            </div>
        </div>

        <div class="form-section">
            <h3 class="section-title">Buchhaltung</h3>
            <div class="form-row">
                <div>
                    <label>Ist- / Sollversteuerung</label>
                    <input id="versteuerung" type="text">
                </div>
                <div>
                    <label>Voranmeldungszeitraum</label>
                    <input id="voranmeldung" type="text">
                </div>
            </div>
            <label>Bilanz oder Gewinnermittler</label>
            <input id="bilanz" type="text">
        </div>

        <div class="form-section">
            <h3 class="section-title">Dokumente</h3>
            <label>Gewerbeanmeldung</label>
            <input id="doc_gewerbeanmeldung" type="file">
        </div>

        <div class="actions">
            <button type="button" onclick="submitPage()">Absenden</button>
        </div>
        <div id="msg" class="msg"></div>
    </div>
</div>

<script>
    async function initPage() {
        const auth = await requireAuth();
        if (auth && auth.user) {
            document.getElementById("userInfo").innerText = "Eingeloggt als: " + auth.user;
        }

        if (window.portalPageInits && typeof window.portalPageInits["/kg-ohg.html"] === "function") {
            await window.portalPageInits["/kg-ohg.html"]();
        }
    }
    initPage();
</script>
</body>
</html>
