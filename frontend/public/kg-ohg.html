<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KG / OHG</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js"></script>
</head>
<body>
<div class="container">
    <div class="panel">
        <div class="topbar">
            <div>
                <h1>KG / OHG</h1>
                <p>Stammdaten für KG oder OHG.</p>
            </div>
            <div class="actions">
                <a class="btn btn-secondary" href="/eg.html">Zur nächsten Seite</a>
                <button onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="grid grid-2">
            <div>
                <label>Unternehmensname</label>
                <input id="unternehmensname" type="text">
            </div>
            <div>
                <label>Rechtsform</label>
                <input id="rechtsform" type="text">
            </div>
            <div>
                <label>Komplementär</label>
                <input id="komplementaer" type="text">
            </div>
            <div>
                <label>Handelsregister</label>
                <input id="handelsregister" type="text">
            </div>
        </div>

        <div class="actions">
            <button onclick="submitKgOhg()">Absenden</button>
        </div>

        <div id="msg" class="msg"></div>
    </div>
</div>

<script>
    requireAuth();

    async function submitKgOhg() {
        await submitFormData("kg_ohg", {
            unternehmensname: document.getElementById("unternehmensname").value,
            rechtsform: document.getElementById("rechtsform").value,
            komplementaer: document.getElementById("komplementaer").value,
            handelsregister: document.getElementById("handelsregister").value
        });
    }
</script>
</body>
</html>
