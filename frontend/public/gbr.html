<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GbR</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js"></script>
</head>
<body>
<div class="container">
    <div class="panel">
        <div class="topbar">
            <div>
                <h1>GbR</h1>
                <p>Stammdaten für Gesellschaft bürgerlichen Rechts.</p>
            </div>
            <div class="actions">
                <a class="btn btn-secondary" href="/gmbh.html">Zur nächsten Seite</a>
                <button onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="grid grid-2">
            <div>
                <label>Unternehmensname</label>
                <input id="unternehmensname" type="text">
            </div>
            <div>
                <label>Unternehmensform</label>
                <input id="unternehmensform" type="text" value="GbR">
            </div>
            <div>
                <label>Gesellschafter 1</label>
                <input id="ges1" type="text">
            </div>
            <div>
                <label>Gesellschafter 2</label>
                <input id="ges2" type="text">
            </div>
        </div>

        <div class="form-section">
            <label>Anschrift</label>
            <textarea id="anschrift"></textarea>
        </div>

        <div class="actions">
            <button onclick="submitGbR()">Absenden</button>
        </div>

        <div id="msg" class="msg"></div>
    </div>
</div>

<script>
    requireAuth();

    async function submitGbR() {
        await submitFormData("gbr", {
            unternehmensname: document.getElementById("unternehmensname").value,
            unternehmensform: document.getElementById("unternehmensform").value,
            gesellschafter_1: document.getElementById("ges1").value,
            gesellschafter_2: document.getElementById("ges2").value,
            anschrift: document.getElementById("anschrift").value
        });
    }
</script>
</body>
</html>
