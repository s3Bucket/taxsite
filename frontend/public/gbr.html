<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GbR</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js?v=2"></script>
</head>
<body>
<div class="container">
    <div class="panel">
        <div class="topbar">
            <div class="topbar-brand">
                <img src="/logo.png" alt="BK Steuerberatung" class="topbar-logo">
                <div>
                    <h1>GbR</h1>
                    <p id="userInfo">Bitte tragen Sie die Stammdaten ein.</p>
                </div>
            </div>
            <div class="actions">
                <a class="btn btn-secondary" href="/portal.html">Zurück zum Portal</a>
                <button type="button" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="form-page-header">
            <div class="form-page-title">Gesellschaft bürgerlichen Rechts (GbR)</div>
            <div class="form-page-desc">Bitte füllen Sie alle relevanten Felder aus und fügen Sie alle Gesellschafter hinzu.</div>
        </div>

        <div class="form-section">
            <h3 class="section-title"><span class="section-num">1</span> Angaben</h3>
            <div class="form-row">
                <div>
                    <label>Anrede</label>
                    <select id="anrede">
                        <option value="">– Bitte wählen –</option>
                        <option>Herr</option><option>Frau</option><option>Divers</option><option>Keine Angabe</option>
                    </select>
                </div>
                <div>
                    <label>Unternehmensform</label>
                    <input id="unternehmensform" type="text">
                </div>
            </div>
            <label>Unternehmensname</label>
            <input id="unternehmensname" type="text">
            <label>Straße und Hausnummer</label>
            <input id="strasse" type="text">
            <div class="form-row">
                <div>
                    <label>PLZ</label>
                    <input id="plz" type="text">
                </div>
                <div>
                    <label>Ort</label>
                    <input id="ort" type="text">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Telefon</label>
                    <input id="telefon" type="tel">
                </div>
                <div>
                    <label>Mobil</label>
                    <input id="mobil" type="tel">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>E-Mail</label>
                    <input id="email" type="email">
                </div>
                <div>
                    <label>Bankverbindung</label>
                    <input id="bankverbindung" type="text">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Steuernummer</label>
                    <input id="steuernummer" type="text">
                </div>
                <div>
                    <label>USt-IdNr.</label>
                    <input id="ustid" type="text">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Gründungsdatum</label>
                    <input id="gruendungsdatum" type="date">
                </div>
                <div>
                    <label>Bundesland</label>
                    <select id="bundesland">
                        <option value="">– Bitte wählen –</option>
                        <option>Baden-Württemberg</option><option>Bayern</option><option>Berlin</option>
                        <option>Brandenburg</option><option>Bremen</option><option>Hamburg</option>
                        <option>Hessen</option><option>Mecklenburg-Vorpommern</option><option>Niedersachsen</option>
                        <option>Nordrhein-Westfalen</option><option>Rheinland-Pfalz</option><option>Saarland</option>
                        <option>Sachsen</option><option>Sachsen-Anhalt</option><option>Schleswig-Holstein</option>
                        <option>Thüringen</option><option>Ausland / Kein Bundesland</option>
                    </select>
                </div>
            </div>
            <label>Unternehmensgegenstand</label>
            <textarea id="gegenstand"></textarea>
        </div>

        <div class="form-section">
            <div class="section-header-row">
                <h3 class="section-title"><span class="section-num">2</span> Gesellschafter</h3>
                <button type="button" class="btn btn-sm btn-outline" onclick="addGesellschafter()">+ Gesellschafter</button>
            </div>
            <div id="gesellschafterContainer"></div>
        </div>

        <div class="form-section">
            <h3 class="section-title"><span class="section-num">3</span> Buchhaltung</h3>
            <div class="form-row">
                <div>
                    <label>Ist- / Sollversteuerung</label>
                    <select id="versteuerung">
                        <option value="">– Bitte wählen –</option>
                        <option>Ist-Versteuerung</option><option>Soll-Versteuerung</option>
                    </select>
                </div>
                <div>
                    <label>Voranmeldungszeitraum</label>
                    <select id="voranmeldung">
                        <option value="">– Bitte wählen –</option>
                        <option>Monatlich</option><option>Vierteljährlich</option><option>Jährlich</option>
                    </select>
                </div>
            </div>
            <label>Bilanz oder Gewinnermittler</label>
            <select id="bilanz">
                <option value="">– Bitte wählen –</option>
                <option>Bilanz</option><option>Einnahmen-Überschuss-Rechnung (EÜR)</option>
            </select>
        </div>

        <div class="form-section">
            <h3 class="section-title"><span class="section-num">4</span> Dokumente</h3>
            <label>Gewerbeanmeldung</label>
            <input id="doc_gewerbeanmeldung" type="file" accept=".pdf,.jpg,.jpeg,.png">
        </div>

        <div class="submit-area">
            <button id="submitBtn" type="button" onclick="submitPage()">Absenden</button>
        </div>
        <div id="msg" class="msg"></div>
    </div>
</div>

<script>
    async function initPage() {
        const auth = await requireAuth();
        if (auth && auth.user) document.getElementById("userInfo").innerText = "Eingeloggt als: " + auth.user;

        if (window.portalPageInits && typeof window.portalPageInits["/gbr.html"] === "function") {
            await window.portalPageInits["/gbr.html"]();
        } else {
            initFileDropZones();
        }
    }
    initPage();
</script>
</body>
</html>
