<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GmbH</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js"></script>
</head>
<body>
<div class="container">
    <div class="panel">
        <div class="topbar">
            <div>
                <h1>GmbH</h1>
                <p>Stammdaten für GmbH.</p>
            </div>
            <div class="actions">
                <a class="btn btn-secondary" href="/kg-ohg.html">Zur nächsten Seite</a>
                <button onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="grid grid-2">
            <div>
                <label>Unternehmensname</label>
                <input id="unternehmensname" type="text">
            </div>
            <div>
                <label>Register-Nr.</label>
                <input id="register_nr" type="text">
            </div>
            <div>
                <label>Registergericht</label>
                <input id="registergericht" type="text">
            </div>
            <div>
                <label>Geschäftsführer</label>
                <input id="geschaeftsfuehrer" type="text">
            </div>
        </div>

        <div class="form-section">
            <label>Unternehmensgegenstand</label>
            <textarea id="gegenstand"></textarea>
        </div>

        <div class="actions">
            <button onclick="submitGmbH()">Absenden</button>
        </div>

        <div id="msg" class="msg"></div>
    </div>
</div>

<script>
    requireAuth();

    async function submitGmbH() {
        await submitFormData("gmbh", {
            unternehmensname: document.getElementById("unternehmensname").value,
            register_nr: document.getElementById("register_nr").value,
            registergericht: document.getElementById("registergericht").value,
            geschaeftsfuehrer: document.getElementById("geschaeftsfuehrer").value,
            gegenstand: document.getElementById("gegenstand").value
        });
    }
</script>
</body>
</html>
