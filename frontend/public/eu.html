<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einzelunternehmen / Freier Beruf</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js"></script>
</head>
<body>
<div class="container">
    <div class="panel">
        <div class="topbar">
            <div>
                <h1>Einzelunternehmen / Freier Beruf</h1>
                <p id="userInfo">Bitte tragen Sie die Stammdaten ein.</p>
            </div>
            <div class="actions">
                <a class="btn btn-secondary" href="/portal.html">Zurück zum Portal</a>
                <button onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="form-section">
            <h3 class="section-title">Angaben</h3>
            <div class="form-row">
                <div>
                    <label>Anrede</label>
                    <input id="anrede" type="text">
                </div>
                <div>
                    <label>Unternehmensform</label>
                    <input id="unternehmensform" type="text">
                </div>
            </div>
            <label>Unternehmensname</label>
            <input id="unternehmensname" type="text">
            <label>Straße und Hausnummer</label>
            <input id="strasse" type="text">
            <div class="form-row">
                <div>
                    <label>PLZ</label>
                    <input id="plz" type="text">
                </div>
                <div>
                    <label>Ort</label>
                    <input id="ort" type="text">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Telefon</label>
                    <input id="telefon" type="tel">
                </div>
                <div>
                    <label>Mobil</label>
                    <input id="mobil" type="tel">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>E-Mail</label>
                    <input id="email" type="email">
                </div>
                <div>
                    <label>Bankverbindung</label>
                    <input id="bankverbindung" type="text">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Steuernummer</label>
                    <input id="steuernummer" type="text">
                </div>
                <div>
                    <label>USt-IdNr.</label>
                    <input id="ustid" type="text">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Gründungsdatum</label>
                    <input id="gruendungsdatum" type="date">
                </div>
                <div>
                    <label>Bundesland</label>
                    <input id="bundesland" type="text">
                </div>
            </div>
            <label>Unternehmensgegenstand</label>
            <textarea id="gegenstand"></textarea>
        </div>

        <div class="form-section">
            <h3 class="section-title">Buchhaltung</h3>
            <div class="form-row">
                <div>
                    <label>Ist- / Sollversteuerung</label>
                    <input id="versteuerung" type="text">
                </div>
                <div>
                    <label>Voranmeldungszeitraum</label>
                    <input id="voranmeldung" type="text">
                </div>
            </div>
            <label>Bilanz oder Gewinnermittler</label>
            <input id="bilanz" type="text">
        </div>

        <div class="form-section">
            <h3 class="section-title">Dokumente</h3>
            <label>Personalausweis des Inhabers</label>
            <input id="doc_personalausweis_inhaber" type="file" multiple>
            <div class="upload-hint">Mehrere Dateien möglich · Max. 5 MB pro Datei.</div>
            <label>Gewerbeanmeldung</label>
            <input id="doc_gewerbeanmeldung" type="file">
            <div class="upload-hint">Max. 5 MB.</div>
        </div>

        <div class="actions">
            <button onclick="submitPage()">Absenden</button>
        </div>
        <div id="msg" class="msg"></div>
    </div>
</div>

<script>
    async function initPage() {
        const auth = await requireAuth();
        if (auth && auth.user) document.getElementById("userInfo").innerText = "Eingeloggt als: " + auth.user;
    }
    initPage();

    async function submitPage() {
        const fields = {
            anrede: document.getElementById("anrede").value,
            unternehmensname: document.getElementById("unternehmensname").value,
            unternehmensform: document.getElementById("unternehmensform").value,
            strasse_hausnummer: document.getElementById("strasse").value,
            plz: document.getElementById("plz").value,
            ort: document.getElementById("ort").value,
            telefon: document.getElementById("telefon").value,
            mobil: document.getElementById("mobil").value,
            email: document.getElementById("email").value,
            bankverbindung: document.getElementById("bankverbindung").value,
            steuernummer: document.getElementById("steuernummer").value,
            unternehmensgegenstand: document.getElementById("gegenstand").value,
            gruendungsdatum: document.getElementById("gruendungsdatum").value,
            ust_idnr: document.getElementById("ustid").value,
            bundesland: document.getElementById("bundesland").value,
            ist_soll_versteuerung: document.getElementById("versteuerung").value,
            voranmeldungszeitraum: document.getElementById("voranmeldung").value,
            bilanz_oder_gewinnermittler: document.getElementById("bilanz").value
        };

        const fileFields = [
            { id: "doc_personalausweis_inhaber", fieldName: "personalausweis_inhaber" },
            { id: "doc_gewerbeanmeldung",        fieldName: "gewerbeanmeldung" }
        ];

        await submitMultipartForm("eu", fields, fileFields);
    }
</script>
</body>
</html>
