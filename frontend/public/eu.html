<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einzelunternehmen / Freier Beruf</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js"></script>
</head>
<body>
<div class="container">
    <div class="panel">
        <div class="topbar">
            <div>
                <h1>Einzelunternehmen / Freier Beruf</h1>
                <p>Bitte trage die Stammdaten ein.</p>
            </div>
            <div class="actions">
                <a class="btn btn-secondary" href="/gbr.html">Zur nächsten Seite</a>
                <button onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="grid grid-2">
            <div>
                <label>Unternehmensname</label>
                <input id="unternehmensname" type="text">
            </div>
            <div>
                <label>Unternehmensform</label>
                <input id="unternehmensform" type="text" value="Einzelunternehmen / freier Beruf">
            </div>
            <div>
                <label>Straße und Hausnummer</label>
                <input id="strasse" type="text">
            </div>
            <div>
                <label>PLZ / Ort</label>
                <input id="ort" type="text">
            </div>
            <div>
                <label>E-Mail</label>
                <input id="email" type="email">
            </div>
            <div>
                <label>Telefon</label>
                <input id="telefon" type="text">
            </div>
        </div>

        <div class="form-section">
            <label>Unternehmensgegenstand</label>
            <textarea id="gegenstand"></textarea>
        </div>

        <div class="actions">
            <button onclick="submitEU()">Absenden</button>
        </div>

        <div id="msg" class="msg"></div>
    </div>
</div>

<script>
    requireAuth();

    async function submitEU() {
        await submitFormData("eu", {
            unternehmensname: document.getElementById("unternehmensname").value,
            unternehmensform: document.getElementById("unternehmensform").value,
            strasse: document.getElementById("strasse").value,
            ort: document.getElementById("ort").value,
            email: document.getElementById("email").value,
            telefon: document.getElementById("telefon").value,
            gegenstand: document.getElementById("gegenstand").value
        });
    }
</script>
</body>
</html>
