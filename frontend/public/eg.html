<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eG</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js"></script>
</head>
<body>
<div class="container">
    <div class="panel">
        <div class="topbar">
            <div>
                <h1>eG</h1>
                <p>Stammdaten für eingetragene Genossenschaft.</p>
            </div>
            <div class="actions">
                <a class="btn btn-secondary" href="/stiftung.html">Zur nächsten Seite</a>
                <button onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="grid grid-2">
            <div>
                <label>Name der Genossenschaft</label>
                <input id="name" type="text">
            </div>
            <div>
                <label>Art der eG</label>
                <input id="art" type="text">
            </div>
            <div>
                <label>Vorstand</label>
                <input id="vorstand" type="text">
            </div>
            <div>
                <label>Register-Nr.</label>
                <input id="register_nr" type="text">
            </div>
        </div>

        <div class="actions">
            <button onclick="submitEg()">Absenden</button>
        </div>

        <div id="msg" class="msg"></div>
    </div>
</div>

<script>
    requireAuth();

    async function submitEg() {
        await submitFormData("eg", {
            name: document.getElementById("name").value,
            art: document.getElementById("art").value,
            vorstand: document.getElementById("vorstand").value,
            register_nr: document.getElementById("register_nr").value
        });
    }
</script>
</body>
</html>
