<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stiftung</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js"></script>
</head>
<body>
<div class="container">
    <div class="panel">
        <div class="topbar">
            <div>
                <h1>Stiftung</h1>
                <p>Stammdaten für Stiftung.</p>
            </div>
            <div class="actions">
                <a class="btn btn-secondary" href="/portal.html">Zurück zum Portal</a>
                <button onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="grid grid-2">
            <div>
                <label>Name der Stiftung</label>
                <input id="name" type="text">
            </div>
            <div>
                <label>Art der Stiftung</label>
                <input id="art" type="text">
            </div>
            <div>
                <label>Vorstand / Vertretung</label>
                <input id="vertretung" type="text">
            </div>
            <div>
                <label>Sitz</label>
                <input id="sitz" type="text">
            </div>
        </div>

        <div class="actions">
            <button onclick="submitStiftung()">Absenden</button>
        </div>

        <div id="msg" class="msg"></div>
    </div>
</div>

<script>
    requireAuth();

    async function submitStiftung() {
        await submitFormData("stiftung", {
            name: document.getElementById("name").value,
            art: document.getElementById("art").value,
            vertretung: document.getElementById("vertretung").value,
            sitz: document.getElementById("sitz").value
        });
    }
</script>
</body>
</html>
