<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stiftung</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js"></script>
</head>
<body>
<div class="container">
    <div class="panel">
        <div class="topbar">
            <div>
                <h1>Stiftung</h1>
                <p id="userInfo">Bitte trage die Felder entsprechend der Excel-Vorlage ein.</p>
            </div>
            <div class="actions">
                <a class="btn btn-secondary" href="/portal.html">Zurück zum Portal</a>
                <button onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="form-section"><h3 class="section-title">Angaben</h3>
            <label for="anrede">Anrede</label><input id="anrede" type="text">
            <label for="unternehmensname">Unternehmensname</label><input id="unternehmensname" type="text">
            <label for="unternehmensform">Unternehmensform</label><input id="unternehmensform" type="text">
            <label for="familien-oder-gemeinnutzige-stiftung">Familien- oder gemeinnützige Stiftung</label><input id="familien-oder-gemeinnutzige-stiftung" type="text">
            <label for="strasse-und-hausnummer">Straße und Hausnummer</label><input id="strasse-und-hausnummer" type="text">
            <label for="plz">PLZ</label><input id="plz" type="text">
            <label for="ort">Ort</label><input id="ort" type="text">
            <label for="telefon">Telefon</label><input id="telefon" type="tel">
            <label for="mobil">Mobil</label><input id="mobil" type="tel">
            <label for="e-mail">E-Mail</label><input id="e-mail" type="email">
            <label for="bankverbindung">Bankverbindung</label><input id="bankverbindung" type="text">
            <label for="steuernummer">Steuernummer</label><input id="steuernummer" type="text">
            <label for="unternehmensgegenstand">Unternehmensgegenstand</label><textarea id="unternehmensgegenstand"></textarea>
            <label for="grundungsdatum">Gründungsdatum</label><input id="grundungsdatum" type="date">
            <label for="ust-idnr">USt-IdNr.</label><input id="ust-idnr" type="text">
            <label for="bundesland">Bundesland</label><input id="bundesland" type="text">
            <label for="registergericht">Registergericht</label><input id="registergericht" type="text">
            <label for="register">Register</label><input id="register" type="text">
            <label for="register-nr">Register-Nr.</label><input id="register-nr" type="text">
            <label for="stifter">Stifter</label><input id="stifter" type="text">
        </div>

        <div class="form-section"><h3 class="section-title">Dokumente</h3>
            <div class="notice">Dokumente aus der Excel-Vorlage sind hier zunächst als Hinweisfelder hinterlegt.</div>
            <div class="document-grid">
                <div><label>Personalausweis des Vorstandes</label><input type="text" placeholder="liegt vor / wird nachgereicht"></div>
                <div><label>Satzung</label><input type="text" placeholder="liegt vor / wird nachgereicht"></div>
            </div>
        </div>

        <div class="actions"><button onclick="submitPage()">Absenden</button></div>
        <div id="msg" class="msg"></div>
    </div>
</div>

<script>
    async function initPage() {
        const auth = await requireAuth();
        if (auth && auth.user) document.getElementById("userInfo").innerText = "Eingeloggt als: " + auth.user;
    }
    initPage();

    async function submitPage() {
        await submitFormData("stiftung", {
            "anrede": document.getElementById("anrede").value,
            "unternehmensname": document.getElementById("unternehmensname").value,
            "unternehmensform": document.getElementById("unternehmensform").value,
            "familien-oder-gemeinnutzige-stiftung": document.getElementById("familien-oder-gemeinnutzige-stiftung").value,
            "strasse-und-hausnummer": document.getElementById("strasse-und-hausnummer").value,
            "plz": document.getElementById("plz").value,
            "ort": document.getElementById("ort").value,
            "telefon": document.getElementById("telefon").value,
            "mobil": document.getElementById("mobil").value,
            "e-mail": document.getElementById("e-mail").value,
            "bankverbindung": document.getElementById("bankverbindung").value,
            "steuernummer": document.getElementById("steuernummer").value,
            "unternehmensgegenstand": document.getElementById("unternehmensgegenstand").value,
            "grundungsdatum": document.getElementById("grundungsdatum").value,
            "ust-idnr": document.getElementById("ust-idnr").value,
            "bundesland": document.getElementById("bundesland").value,
            "registergericht": document.getElementById("registergericht").value,
            "register": document.getElementById("register").value,
            "register-nr": document.getElementById("register-nr").value,
            "stifter": document.getElementById("stifter").value
        });
    }
</script>
</body>
</html>
