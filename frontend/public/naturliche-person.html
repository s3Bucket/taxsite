<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natürliche Person</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js"></script>
</head>
<body>
<div class="container">
    <div class="panel">
        <div class="topbar">
            <div>
                <h1>Natürliche Person</h1>
                <p>Persönliche Stammdaten.</p>
            </div>
            <div class="actions">
                <a class="btn btn-secondary" href="/eu.html">Zur ersten Seite</a>
                <button onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="grid grid-2">
            <div>
                <label>Vorname</label>
                <input id="vorname" type="text">
            </div>
            <div>
                <label>Nachname</label>
                <input id="nachname" type="text">
            </div>
            <div>
                <label>Geburtsdatum</label>
                <input id="geburtsdatum" type="date">
            </div>
            <div>
                <label>Staatsangehörigkeit</label>
                <input id="staatsangehoerigkeit" type="text">
            </div>
            <div>
                <label>E-Mail</label>
                <input id="email" type="email">
            </div>
            <div>
                <label>Telefon</label>
                <input id="telefon" type="text">
            </div>
        </div>

        <div class="form-section">
            <label>Anschrift</label>
            <textarea id="anschrift"></textarea>
        </div>

        <div class="actions">
            <button onclick="submitPerson()">Absenden</button>
        </div>

        <div id="msg" class="msg"></div>
    </div>
</div>

<script>
    requireAuth();

    async function submitPerson() {
        await submitFormData("natuerliche_person", {
            vorname: document.getElementById("vorname").value,
            nachname: document.getElementById("nachname").value,
            geburtsdatum: document.getElementById("geburtsdatum").value,
            staatsangehoerigkeit: document.getElementById("staatsangehoerigkeit").value,
            email: document.getElementById("email").value,
            telefon: document.getElementById("telefon").value,
            anschrift: document.getElementById("anschrift").value
        });
    }
</script>
</body>
</html>
