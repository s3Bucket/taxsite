<script>
// === n8n Webhook Submit (enhanced) ===
const WEBHOOK_URL = "https://DEIN-N8N-WEBHOOK-URL/webhook/stammdaten";

// Timeout helper (AbortController)
async function fetchWithTimeout(url, options={}, timeoutMs=20000){
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch(url, {...options, signal: controller.signal});
    return res;
  } finally {
    clearTimeout(id);
  }
}

function setAlert(type, title, details=[]) {
  const box = document.getElementById("alertBox");
  box.className = "alert " + (type || "");
  box.style.display = "block";
  const safe = (s) => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
  let html = `<div class="title">${safe(title)}</div>`;
  if (details && details.length) {
    html += "<ul>" + details.map(d => `<li>${safe(d)}</li>`).join("") + "</ul>";
  }
  box.innerHTML = html;
  box.scrollIntoView({behavior:"smooth", block:"start"});
}

function clearAlert() {
  const box = document.getElementById("alertBox");
  box.style.display = "none";
  box.innerHTML = "";
}

function toast(msg, isError=false){
  const t = document.createElement("div");
  t.textContent = msg;
  t.style.position="fixed";
  t.style.left="50%";
  t.style.bottom="18px";
  t.style.transform="translateX(-50%)";
  t.style.background= isError ? "rgba(127,29,29,.98)" : "rgba(15,23,42,.98)";
  t.style.border="1px solid rgba(37,99,235,.35)";
  t.style.padding="10px 12px";
  t.style.borderRadius="12px";
  t.style.color="#fff";
  t.style.boxShadow="0 10px 30px rgba(2,6,23,.25)";
  t.style.zIndex="9999";
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2200);
}

function markField(el, isError) {
  if (!el || !el.classList) return;
  el.classList.toggle("field-error", !!isError);
}

function inferRequiredFields(form) {
  // Heuristics: treat common key fields as required if present
  const keys = [
    "vorname","nachname","unternehmensname","e-mail","email","straße","strasse","plz","ort"
  ];
  const required = [];
  for (const el of Array.from(form.elements)) {
    if (!el.name || el.type === "file") continue;
    const n = el.name.toLowerCase();
    if (keys.some(k => n.includes(k))) required.push(el);
  }
  // ensure uniqueness
  return Array.from(new Set(required));
}

function validateForm(form) {
  clearAlert();
  let errors = [];

  // clear previous highlighting
  for (const el of Array.from(form.elements)) markField(el, false);

  // basic email validation if present
  const emailEls = Array.from(form.elements).filter(e => e.name && (e.name.toLowerCase().includes("email") || e.type==="email"));
  for (const el of emailEls) {
    if (el.value && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(el.value.trim())) {
      errors.push(`Ungültige E-Mail: "${el.value}"`);
      markField(el, true);
    }
  }

  // required (heuristic)
  const req = inferRequiredFields(form);
  for (const el of req) {
    if (!el.value || !String(el.value).trim()) {
      const label = el.closest("div")?.querySelector("label")?.innerText || el.name;
      errors.push(`Pflichtfeld fehlt: ${label}`);
      markField(el, true);
    }
  }

  // date plausibility: no future dates for "geburtsdatum"
  const dateEls = Array.from(form.elements).filter(e => e.type==="date" && e.value);
  const now = new Date();
  for (const el of dateEls) {
    const name = el.name.toLowerCase();
    const d = new Date(el.value + "T00:00:00");
    if (name.includes("geburtsdatum") && d > now) {
      errors.push("Geburtsdatum liegt in der Zukunft.");
      markField(el, true);
    }
  }

  if (errors.length) {
    setAlert("error", "Bitte prüfe die Eingaben.", errors.slice(0, 10));
    toast("Bitte Pflichtfelder ausfüllen.", true);
    return false;
  }
  return true;
}

function setSubmitting(isSubmitting) {
  const submitBtn = document.getElementById("submitBtn");
  const exportBtn = document.getElementById("exportBtn");
  const saveBtn = document.getElementById("saveBtn");
  const loadBtn = document.getElementById("loadBtn");
  const resetBtn = document.querySelector("button[type='reset']");
  [submitBtn, exportBtn, saveBtn, loadBtn, resetBtn].forEach(b => { if (b) b.disabled = isSubmitting; });
  if (submitBtn) {
    submitBtn.innerHTML = isSubmitting ? `<span class="spinner"></span> Sende…` : "Absenden";
  }
}

async function submitToWebhook(form) {
  clearAlert();

  if (!WEBHOOK_URL || WEBHOOK_URL.includes("DEIN-N8N-WEBHOOK-URL")) {
    setAlert("error", "Webhook-URL fehlt.", ["Bitte WEBHOOK_URL in der HTML-Datei setzen."]);
    toast("WEBHOOK_URL fehlt.", true);
    return;
  }

  if (!navigator.onLine) {
    setAlert("error", "Offline.", ["Keine Internetverbindung erkannt. Bitte erneut versuchen."]);
    toast("Offline.", true);
    return;
  }

  if (!validateForm(form)) return;

  const fd = new FormData(form);
  fd.append("_meta_source", window.location.pathname.split("/").pop() || "form");
  fd.append("_meta_ts", new Date().toISOString());

  setSubmitting(true);

  try {
    const res = await fetchWithTimeout(WEBHOOK_URL, { method: "POST", body: fd }, 25000);

    // n8n can return JSON or text; handle both
    const ct = res.headers.get("content-type") || "";
    let payloadText = "";
    let payloadJson = null;
    if (ct.includes("application/json")) {
      payloadJson = await res.json().catch(()=>null);
    } else {
      payloadText = await res.text().catch(()=> "");
    }

    if (!res.ok) {
      const hint = payloadJson ? JSON.stringify(payloadJson).slice(0,300) : payloadText.slice(0,300);
      throw new Error(`Webhook Fehler (${res.status}): ${hint || "unbekannt"}`);
    }

    setAlert("success", "Gesendet ✔", [
      "Die Daten wurden an n8n übergeben.",
      payloadJson ? "Antwort: JSON empfangen." : (payloadText ? "Antwort: Text empfangen." : "Antwort: leer.")
    ]);
    toast("Gesendet ✔");

    // Optional: clear draft on success
    const key = form.dataset.draftKey;
    if (key) localStorage.removeItem(key);

    // Optional: reset after success
    // form.reset();

  } catch (e) {
    console.error(e);
    const msg = (e && e.name === "AbortError")
      ? "Timeout: n8n hat nicht rechtzeitig geantwortet."
      : ("Senden fehlgeschlagen: " + (e?.message || e));
    setAlert("error", "Senden fehlgeschlagen.", [
      msg,
      "Tipp: Prüfe CORS / Reverse-Proxy, und ob die Webhook-URL stimmt."
    ]);
    toast("Senden fehlgeschlagen.", true);
  } finally {
    setSubmitting(false);
  }
}

// === Draft helpers (local) ===
function formToJSON(form){
  const data = {};
  const fd = new FormData(form);
  for (const [k,v] of fd.entries()) {
    if (v instanceof File) {
      if (!v || !v.name) continue;
      if (!data[k]) data[k]=[];
      data[k].push(v.name);
    } else {
      if (data[k] !== undefined) {
        if (!Array.isArray(data[k])) data[k]=[data[k]];
        data[k].push(v);
      } else {
        data[k]=v;
      }
    }
  }
  return data;
}
function saveDraft(form, key){ localStorage.setItem(key, JSON.stringify(formToJSON(form))); toast("Entwurf gespeichert."); }
function loadDraft(form, key){
  const raw = localStorage.getItem(key);
  if (!raw){ toast("Kein Entwurf gefunden."); return; }
  const data = JSON.parse(raw);
  for (const [k,v] of Object.entries(data)) {
    const el = form.elements[k];
    if (!el) continue;
    if (el.type === "file") continue;
    el.value = Array.isArray(v) ? v[0] : v;
  }
  toast("Entwurf geladen.");
}
function downloadJSON(form, filename){
  const data = formToJSON(form);
  const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// === Collapsible sections ===
function setupCollapsibles(){
  document.querySelectorAll("fieldset").forEach(fs => {
    fs.dataset.collapsible = "1";
    const legend = fs.querySelector("legend");
    if (!legend) return;
    if (!legend.querySelector(".chev")) {
      const chev = document.createElement("span");
      chev.className = "chev";
      legend.prepend(chev);
    }
    legend.addEventListener("click", () => {
      fs.classList.toggle("collapsed");
    });
  });
}

const form = document.getElementById('mainForm');
form.dataset.draftKey = 'draft:naturliche-person';

setupCollapsibles();

document.getElementById('submitBtn').addEventListener('click', () => submitToWebhook(form));
document.getElementById('saveBtn').addEventListener('click', () => saveDraft(form, 'draft:naturliche-person'));
document.getElementById('loadBtn').addEventListener('click', () => loadDraft(form, 'draft:naturliche-person'));
document.getElementById('exportBtn').addEventListener('click', () => downloadJSON(form, 'naturliche-person.json'));
</script>
