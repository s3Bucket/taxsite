<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natürliche Person</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js"></script>
</head>
<body>
<div class="container">
    <div class="panel">
        <div class="topbar">
            <div class="topbar-brand">
                <img src="/logo.png" alt="BK Steuerberatung" class="topbar-logo">
                <div>
                    <h1>Natürliche Person</h1>
                    <p id="userInfo">Bitte tragen Sie die Stammdaten ein.</p>
                </div>
            </div>
            <div class="actions">
                <a class="btn btn-secondary" href="/portal.html">Zurück zum Portal</a>
                <button type="button" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="form-page-header">
            <div class="form-page-title">Natürliche Person / Einkommensteuer</div>
            <div class="form-page-desc">Bitte füllen Sie die Angaben für beide Ehepartner aus und fügen Sie ggf. Kinder hinzu.</div>
        </div>

        <!-- Ehepartner 1 -->
        <div class="form-section">
            <h3 class="section-title"><span class="section-num">1</span> Angaben – Ehepartner 1</h3>
            <div class="form-row">
                <div>
                    <label>Anrede</label>
                    <select id="anrede1">
                        <option value="">– Bitte wählen –</option>
                        <option>Herr</option><option>Frau</option><option>Divers</option><option>Keine Angabe</option>
                    </select>
                </div>
                <div>
                    <label>Titel / akad. Grad</label>
                    <input id="titel1" type="text">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Vorname</label>
                    <input id="vorname1" type="text">
                </div>
                <div>
                    <label>Nachname</label>
                    <input id="nachname1" type="text">
                </div>
            </div>
            <label>Straße und Hausnummer</label>
            <input id="strasse1" type="text">
            <div class="form-row">
                <div>
                    <label>PLZ</label>
                    <input id="plz1" type="text">
                </div>
                <div>
                    <label>Ort</label>
                    <input id="ort1" type="text">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Telefon</label>
                    <input id="telefon1" type="tel">
                </div>
                <div>
                    <label>Mobil</label>
                    <input id="mobil1" type="tel">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>E-Mail</label>
                    <input id="email1" type="email">
                </div>
                <div>
                    <label>Bankverbindung</label>
                    <input id="bank1" type="text">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Steuernummer</label>
                    <input id="steuer1" type="text">
                </div>
                <div>
                    <label>Identifikationsnummer</label>
                    <input id="ident1" type="text">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Geburtsdatum</label>
                    <input id="geburt1" type="date">
                </div>
                <div>
                    <label>Familienstand</label>
                    <select id="familienstand1">
                        <option value="">– Bitte wählen –</option>
                        <option>Ledig</option><option>Verheiratet</option><option>Geschieden</option>
                        <option>Verwitwet</option><option>Eingetragene Lebenspartnerschaft</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Staatsangehörigkeit</label>
                    <input id="staat1" type="text">
                </div>
                <div>
                    <label>Religionszugehörigkeit</label>
                    <select id="religion1">
                        <option value="">– Bitte wählen –</option>
                        <option>Evangelisch</option><option>Katholisch</option><option>Jüdisch</option>
                        <option>Konfessionslos</option><option>Andere</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Geschlecht</label>
                    <select id="geschlecht1">
                        <option value="">– Bitte wählen –</option>
                        <option>Männlich</option><option>Weiblich</option><option>Divers</option><option>Keine Angabe</option>
                    </select>
                </div>
                <div>
                    <label>Beruf</label>
                    <input id="beruf1" type="text">
                </div>
            </div>
            <label>Bundesland</label>
            <select id="bundesland1">
                <option value="">– Bitte wählen –</option>
                <option>Baden-Württemberg</option><option>Bayern</option><option>Berlin</option>
                <option>Brandenburg</option><option>Bremen</option><option>Hamburg</option>
                <option>Hessen</option><option>Mecklenburg-Vorpommern</option><option>Niedersachsen</option>
                <option>Nordrhein-Westfalen</option><option>Rheinland-Pfalz</option><option>Saarland</option>
                <option>Sachsen</option><option>Sachsen-Anhalt</option><option>Schleswig-Holstein</option>
                <option>Thüringen</option><option>Ausland / Kein Bundesland</option>
            </select>
            <label>Personalausweis Ehepartner 1</label>
            <input id="doc_personalausweis_ep1" type="file" accept=".pdf,.jpg,.jpeg,.png" multiple>
        </div>

        <!-- Ehepartner 2 -->
        <div class="form-section">
            <h3 class="section-title"><span class="section-num">2</span> Angaben – Ehepartner 2</h3>

            <div class="form-row">
                <div>
                    <label>Vorname</label>
                    <input id="vorname2" type="text">
                </div>
                <div>
                    <label>Nachname</label>
                    <input id="nachname2" type="text">
                </div>
            </div>
            <label>Straße und Hausnummer</label>
            <input id="strasse2" type="text">
            <div class="form-row">
                <div>
                    <label>PLZ</label>
                    <input id="plz2" type="text">
                </div>
                <div>
                    <label>Ort</label>
                    <input id="ort2" type="text">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Telefon</label>
                    <input id="telefon2" type="tel">
                </div>
                <div>
                    <label>Mobil</label>
                    <input id="mobil2" type="tel">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>E-Mail</label>
                    <input id="email2" type="email">
                </div>
                <div>
                    <label>Bankverbindung</label>
                    <input id="bank2" type="text">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Steuernummer</label>
                    <input id="steuer2" type="text">
                </div>
                <div>
                    <label>Identifikationsnummer</label>
                    <input id="ident2" type="text">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Geburtsdatum</label>
                    <input id="geburt2" type="date">
                </div>
                <div>
                    <label>Familienstand</label>
                    <select id="familienstand2">
                        <option value="">– Bitte wählen –</option>
                        <option>Ledig</option><option>Verheiratet</option><option>Geschieden</option>
                        <option>Verwitwet</option><option>Eingetragene Lebenspartnerschaft</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Staatsangehörigkeit</label>
                    <input id="staat2" type="text">
                </div>
                <div>
                    <label>Religionszugehörigkeit</label>
                    <select id="religion2">
                        <option value="">– Bitte wählen –</option>
                        <option>Evangelisch</option><option>Katholisch</option><option>Jüdisch</option>
                        <option>Konfessionslos</option><option>Andere</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Geschlecht</label>
                    <select id="geschlecht2">
                        <option value="">– Bitte wählen –</option>
                        <option>Männlich</option><option>Weiblich</option><option>Divers</option><option>Keine Angabe</option>
                    </select>
                </div>
                <div>
                    <label>Beruf</label>
                    <input id="beruf2" type="text">
                </div>
            </div>
            <label>Bundesland</label>
            <select id="bundesland2">
                <option value="">– Bitte wählen –</option>
                <option>Baden-Württemberg</option><option>Bayern</option><option>Berlin</option>
                <option>Brandenburg</option><option>Bremen</option><option>Hamburg</option>
                <option>Hessen</option><option>Mecklenburg-Vorpommern</option><option>Niedersachsen</option>
                <option>Nordrhein-Westfalen</option><option>Rheinland-Pfalz</option><option>Saarland</option>
                <option>Sachsen</option><option>Sachsen-Anhalt</option><option>Schleswig-Holstein</option>
                <option>Thüringen</option><option>Ausland / Kein Bundesland</option>
            </select>
            <label>Personalausweis Ehepartner 2</label>
            <input id="doc_personalausweis_ep2" type="file" accept=".pdf,.jpg,.jpeg,.png" multiple>
        </div>

        <!-- Kinder -->
        <div class="form-section">
            <div class="section-header-row">
                <h3 class="section-title"><span class="section-num">3</span> Kinder</h3>
                <button type="button" class="btn btn-sm btn-outline" onclick="addChild()">+ Kind</button>
            </div>
            <div id="childrenContainer"></div>
        </div>

        <div class="submit-area">
            <button id="submitBtn" type="button" onclick="submitPage()">Absenden</button>
        </div>
        <div id="msg" class="msg"></div>
    </div>
</div>

<script>
    async function initPage() {
        const auth = await requireAuth();
        if (auth && auth.user) {
            document.getElementById("userInfo").innerText = "Eingeloggt als: " + auth.user;
        }

        if (window.portalPageInits && typeof window.portalPageInits["/naturliche-person.html"] === "function") {
            await window.portalPageInits["/naturliche-person.html"]();
        } else {
            initFileDropZones();
        }
    }
    initPage();
</script>
</body>
</html>
