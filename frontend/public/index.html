<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body{font-family:Arial;background:#f3f6fb;display:flex;height:100vh;justify-content:center;align-items:center;}
        .card{background:white;padding:40px;border-radius:10px;width:320px;box-shadow:0 10px 30px rgba(0,0,0,0.1);}
        input{width:100%;padding:10px;margin-top:10px;}
        button{width:100%;margin-top:20px;padding:10px;background:#2b6cb0;color:white;border:none;border-radius:5px;cursor:pointer;}
        .error{color:red;margin-top:10px;}
    </style>
</head>
<body>
<div class="card">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Passwort">
    <button onclick="login()">Login</button>
    <div id="error" class="error"></div>
    <p>Noch kein Konto? <a href="/register.html">Registrieren</a></p>
</div>

<script>
    async function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        const res = await fetch("/api/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ email, password }),
            credentials: "include"
        });

        if (!res.ok) {
            document.getElementById("error").innerText = "Login fehlgeschlagen";
            return;
        }

        window.location = "/";
    }

    async function logout() {
        await fetch("/api/logout", {
            method: "POST",
            credentials: "include"
        });
        window.location = "/login.html";
    }
</script>
</body>
</html>
