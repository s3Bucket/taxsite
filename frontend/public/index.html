<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f6fb;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 340px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            background: #2b6cb0;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .error {
            color: #b91c1c;
            margin-top: 12px;
            min-height: 20px;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Login</h2>

    <input id="email" type="email" placeholder="E-Mail">
    <input id="password" type="password" placeholder="Passwort">

    <button onclick="login()">Anmelden</button>

    <div id="error" class="error"></div>

    <p>Noch kein Konto? <a href="/register.html">Registrieren</a></p>
</div>

<script>
    async function login() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const errorBox = document.getElementById("error");
        errorBox.textContent = "";

        const res = await fetch("/api/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            credentials: "include",
            body: JSON.stringify({ email, password })
        });

        if (!res.ok) {
            errorBox.textContent = "Login fehlgeschlagen.";
            return;
        }

        // Nur bei erfolgreichem Backend-Login weiter
        window.location.href = "/eu.html";
    }
</script>
</body>
</html>
