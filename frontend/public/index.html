<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="page-center">
    <div class="card">
        <h2>Anmelden</h2>
        <p>Bitte melde dich mit deinen Zugangsdaten an.</p>

        <input id="email" type="email" placeholder="E-Mail">
        <input id="password" type="password" placeholder="Passwort">

        <button onclick="loginUser()">Anmelden</button>

        <div id="msg" class="msg"></div>

        <p class="small" style="margin-top:18px;">
            Noch kein Konto? <a href="/register.html">Jetzt registrieren</a>
        </p>
    </div>
</div>

<script>
    async function loginUser() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const msg = document.getElementById("msg");
        msg.textContent = "";

        if (!email || !password) {
            msg.textContent = "Bitte E-Mail und Passwort eingeben.";
            return;
        }

        try {
            const res = await fetch("/api/login", {
                method: "POST",
                credentials: "include",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json().catch(() => null);

            if (!res.ok) {
                msg.textContent = data?.detail || "Login fehlgeschlagen.";
                return;
            }

            window.location.href = "/eu.html";
        } catch (err) {
            msg.textContent = "Server nicht erreichbar.";
        }
    }
</script>
</body>
</html>
