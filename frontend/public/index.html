<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BK Steuerberatung</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/supabase.js"></script>
    <script src="/app.js"></script>
</head>
<body class="auth-body">

<div class="auth-wrap">
    <img src="/logo.png" alt="BK Steuerberatung" class="auth-logo">

    <div class="auth-card">
        <p class="auth-card-title">Anmelden</p>
        <p class="auth-card-sub">Bitte melden Sie sich mit Ihren Zugangsdaten an.</p>

        <label for="email">E-Mail-Adresse</label>
        <input id="email" type="email" placeholder="name@beispiel.de" autocomplete="email">

        <label for="password">Passwort</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">

        <div class="auth-actions" style="margin-top:24px;">
            <button class="btn-full" onclick="loginUser()">Anmelden</button>
            <a class="btn btn-secondary btn-full" href="/register.html">Jetzt registrieren</a>
        </div>

        <div id="msg" class="msg"></div>
    </div>

    <p class="auth-footer">© BK Steuerberatung &nbsp;·&nbsp; Stammdaten-Portal</p>
</div>

<script>
    redirectIfAuthenticated();

    async function loginUser() {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const msg      = document.getElementById('msg');
        msg.textContent = '';
        msg.classList.remove('success');

        if (!email || !password) {
            msg.textContent = 'Bitte E-Mail und Passwort eingeben.';
            return;
        }

        try {
            const { data, error } = await window._sb.auth.signInWithPassword({ email, password });

            if (error) {
                msg.textContent = error.message || 'Login fehlgeschlagen.';
                return;
            }

            window._setSessionCookie(data.session.access_token);
            window.location.href = '/portal.html';
        } catch (_) {
            msg.textContent = 'Server nicht erreichbar.';
        }
    }

    document.getElementById('password').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') loginUser();
    });
</script>
</body>
</html>
