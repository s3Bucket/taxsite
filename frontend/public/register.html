<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrieren</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="page-center">
    <div class="card">
        <h2>Registrieren</h2>

        <input id="email" type="email" placeholder="E-Mail">
        <input id="password" type="password" placeholder="Passwort">

        <small class="password-rules">
            Passwortregeln:
            <ul>
                <li>mindestens 8 Zeichen</li>
                <li>maximal 72 Zeichen</li>
                <li>erlaubte Zeichen: Buchstaben, Zahlen und !@#$%^&amp;*()_-+=.?</li>
            </ul>
        </small>

        <button onclick="registerUser()">Registrieren</button>

        <div id="msg" class="msg"></div>

        <p class="small" style="margin-top:18px;">
            <a href="/index.html">Zum Login</a>
        </p>
    </div>
</div>

<script>
    async function registerUser() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const msg = document.getElementById("msg");

        msg.textContent = "";
        msg.classList.remove("success");

        if (!email) {
            msg.textContent = "Bitte eine E-Mail-Adresse eingeben.";
            return;
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            msg.textContent = "Bitte eine gültige E-Mail-Adresse eingeben.";
            return;
        }

        if (!password) {
            msg.textContent = "Bitte ein Passwort eingeben.";
            return;
        }

        if (password.length < 8) {
            msg.textContent = "Passwort muss mindestens 8 Zeichen lang sein.";
            return;
        }

        if (password.length > 72) {
            msg.textContent = "Passwort ist zu lang (maximal 72 Zeichen).";
            return;
        }

        const pwRegex = /^[A-Za-z0-9!@#$%^&*()_\-+=.?]+$/;
        if (!pwRegex.test(password)) {
            msg.textContent = "Passwort enthält unerlaubte Zeichen.";
            return;
        }

        try {
            const res = await fetch("/api/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json().catch(() => null);

            if (!res.ok) {
                if (res.status === 400 && data?.detail === "User already exists") {
                    msg.textContent = "Dieser Benutzer existiert bereits.";
                    return;
                }

                if (res.status === 422) {
                    msg.textContent = "Ungültige Eingaben. Bitte prüfe E-Mail und Passwortregeln.";
                    return;
                }

                msg.textContent = data?.detail || "Registrierung fehlgeschlagen.";
                return;
            }

            msg.textContent = "Registrierung erfolgreich. Weiter zum Login.";
            msg.classList.add("success");

            setTimeout(() => {
                window.location.href = "/index.html";
            }, 1200);
        } catch (err) {
            msg.textContent = "Server nicht erreichbar.";
        }
    }
</script>
</body>
</html>
