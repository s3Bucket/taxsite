<small>
    Passwortregeln:
    <ul>
        <li>mindestens 8 Zeichen</li>
        <li>maximal 72 Zeichen</li>
        <li>Buchstaben, Zahlen oder !@#$%^&*</li>
    </ul>
</small>


<script>


    async function registerUser() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const msg = document.getElementById("msg");
        msg.textContent = "";
        msg.style.color = "red";

        // ---------- Frontend Validierung ----------

        if (!email) {
            msg.textContent = "Bitte eine E-Mail-Adresse eingeben.";
            return;
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (!emailRegex.test(email)) {
            msg.textContent = "Bitte eine gültige E-Mail-Adresse eingeben.";
            return;
        }

        if (password.length < 8) {
            msg.textContent = "Passwort muss mindestens 8 Zeichen lang sein.";
            return;
        }

        if (password.length > 72) {
            msg.textContent = "Passwort ist zu lang (maximal 72 Zeichen).";
            return;
        }

        // Optional: nur erlaubte Zeichen prüfen
        const pwRegex = /^[A-Za-z0-9!@#$%^&*()_\-+=.?]+$/;

        if (!pwRegex.test(password)) {
            msg.textContent =
                "Passwort enthält unerlaubte Zeichen.";
            return;
        }

        // ---------- Request ----------

        try {
            const res = await fetch("/api/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json().catch(() => null);

            if (!res.ok) {

                if (res.status === 400 && data?.detail === "User already exists") {
                    msg.textContent = "Dieser Benutzer existiert bereits.";
                    return;
                }

                if (res.status === 422) {
                    msg.textContent = "Ungültige Eingaben.";
                    return;
                }

                msg.textContent = "Registrierung fehlgeschlagen.";
                return;
            }

            msg.style.color = "green";
            msg.textContent = "Registrierung erfolgreich. Weiter zum Login.";

            setTimeout(() => {
                window.location.href = "/index.html";
            }, 1200);

        } catch (err) {
            msg.textContent = "Server nicht erreichbar.";
        }
    }
</script>
