<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrierung | BK Steuerberatung</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js"></script>
</head>
<body>
<div class="header">
    <img src="/static/Logo.png" alt="BK Steuerberatung Logo" class="logo">
</div>
<div class="page-center">
    <div class="card">
        <h2>Registrierung</h2>
        <p>Lege hier einen neuen Zugang für das Portal an.</p>

        <label for="email">E-Mail</label>
        <input id="email" type="email" placeholder="name@beispiel.de" autocomplete="email">

        <label for="password">Passwort</label>
        <input id="password" type="password" placeholder="Passwort" autocomplete="new-password">

        <label for="passwordConfirm">Passwort wiederholen</label>
        <input id="passwordConfirm" type="password" placeholder="Passwort wiederholen" autocomplete="new-password">

        <div class="password-rules">
            Das Passwort sollte mindestens 8 Zeichen lang sein.
        </div>

        <div class="auth-actions">
            <button onclick="registerUser()">Registrieren</button>
            <a class="btn btn-secondary" href="/index.html">Zurück zum Login</a>
        </div>

        <div id="msg" class="msg"></div>
    </div>
</div>

<script>
    redirectIfAuthenticated();

    async function registerUser() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const passwordConfirm = document.getElementById('passwordConfirm').value;
        const msg = document.getElementById('msg');
        msg.textContent = '';
        msg.classList.remove('success');

        if (!email || !password || !passwordConfirm) {
            msg.textContent = 'Bitte alle Felder ausfüllen.';
            return;
        }

        if (password.length < 8) {
            msg.textContent = 'Das Passwort muss mindestens 8 Zeichen lang sein.';
            return;
        }

        if (password !== passwordConfirm) {
            msg.textContent = 'Die Passwörter stimmen nicht überein.';
            return;
        }

        try {
            const res = await fetch('/api/register', {
                method: 'POST',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json().catch(() => null);

            if (!res.ok) {
                msg.textContent = data?.detail || data?.message || 'Registrierung fehlgeschlagen.';
                return;
            }

            msg.textContent = data?.message || 'Registrierung erfolgreich. Du wirst jetzt zum Portal weitergeleitet.';
            msg.classList.add('success');

            setTimeout(() => {
                window.location.href = '/portal.html';
            }, 700);
        } catch (_) {
            msg.textContent = 'Server nicht erreichbar.';
        }
    }
</script>
</body>
</html>
