<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrierung | BK Steuerberatung</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js"></script>
</head>
<body class="auth-body">

<div class="auth-wrap">
    <img src="/logo.png" alt="BK Steuerberatung" class="auth-logo">

    <div class="auth-card">
        <p class="auth-card-title">Zugang anlegen</p>
        <p class="auth-card-sub">Erstellen Sie hier Ihren Zugang für das Stammdaten-Portal.</p>

        <label for="email">E-Mail-Adresse</label>
        <input id="email" type="email" placeholder="name@beispiel.de" autocomplete="email">

        <label for="password">Passwort</label>
        <input id="password" type="password" placeholder="Mindestens 8 Zeichen" autocomplete="new-password">

        <label for="passwordConfirm">Passwort wiederholen</label>
        <input id="passwordConfirm" type="password" placeholder="••••••••" autocomplete="new-password">

        <div class="auth-actions" style="margin-top:24px;">
            <button class="btn-full" onclick="registerUser()">Registrieren</button>
            <a class="btn btn-secondary btn-full" href="/index.html">Zurück zum Login</a>
        </div>

        <div id="msg" class="msg"></div>
    </div>

    <p class="auth-footer">© BK Steuerberatung &nbsp;·&nbsp; Stammdaten-Portal</p>
</div>

<script>
    redirectIfAuthenticated();

    async function registerUser() {
        const email           = document.getElementById('email').value.trim();
        const password        = document.getElementById('password').value;
        const passwordConfirm = document.getElementById('passwordConfirm').value;
        const msg             = document.getElementById('msg');
        msg.textContent = '';
        msg.classList.remove('success');

        if (!email || !password || !passwordConfirm) {
            msg.textContent = 'Bitte alle Felder ausfüllen.';
            return;
        }
        if (password.length < 8) {
            msg.textContent = 'Das Passwort muss mindestens 8 Zeichen lang sein.';
            return;
        }
        if (password !== passwordConfirm) {
            msg.textContent = 'Die Passwörter stimmen nicht überein.';
            return;
        }

        try {
            const res = await fetch('/api/register', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json().catch(() => null);

            if (!res.ok) {
                msg.textContent = data?.detail || data?.message || 'Registrierung fehlgeschlagen.';
                return;
            }

            msg.textContent = data?.message || 'Registrierung erfolgreich. Sie werden weitergeleitet …';
            msg.classList.add('success');
            setTimeout(() => { window.location.href = '/portal.html'; }, 700);
        } catch (_) {
            msg.textContent = 'Server nicht erreichbar.';
        }
    }
</script>
</body>
</html>
